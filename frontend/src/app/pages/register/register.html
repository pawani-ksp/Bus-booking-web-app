<div class="register-page">

    

   <div class="register-background">
      <form class="register-card" autocomplete="on" (submit)="onSubmit($event)">
         <h1>Register</h1>
         <p class="register-subtitle">Create an account to book your bus seat.</p>
         
         <div class="form-group">
            <label for="name">Name</label>
            <input id="name" name="name" type="name" placeholder="Enter your name" required />
         </div>

         <div class="form-group">
            <label for="number">Phone Number</label>
            <input id="number" name="number" type="text" placeholder="Enter your phone number" required />
         </div>


         <div class="form-group">
            <label for="email">Email address</label>
            <input id="email" name="email" type="email" placeholder="Enter your email" required />
         </div>

         <div class="form-group">
            <label for="password">Password</label>
            <input id="password" name="password" type="password" placeholder="Enter your password" required />
         </div>

         <div class="form-group">
            <label for="confirm-password">Confirm Password</label>
            <input id="confirm-password" name="confirm-password" type="password" placeholder="Confirm your password" required />
         </div>

         <div class="form-group">
            <label for="role">Account Type</label>
            <select id="role" name="role" required>
               <option value="passenger">Passenger</option>
               <option value="owner">Bus Owner</option>
               <option value="driver">Driver</option>
            </select>
         </div>

         <div class="form-row">
            <label class="remember-me" for="remember">
               <input id="remember" name="remember" type="checkbox" />
               Remember me
            </label>

            
         </div>

         <button type="submit" class="register-btn">Register</button>

      </form>
   </div>
</div>
